<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <!-- Phone Frame -->
  <rect x="0" y="0" width="375" height="812" fill="#2a3a4a"/>
  
  <!-- Full Map Background -->
  <rect x="0" y="0" width="375" height="812" fill="#1f3040"/>
  
  <!-- Map Grid Lines (simulate map) -->
  <line x1="0" y1="200" x2="375" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="400" x2="375" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="0" y1="600" x2="375" y2="600" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="125" y1="0" x2="125" y2="812" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="250" y1="0" x2="250" y2="812" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Route Path -->
  <path d="M50,700 Q100,550 180,450 Q250,350 300,200 Q330,100 300,50" stroke="#E91E63" stroke-width="4" fill="none"/>
  
  <!-- Current Location -->
  <circle cx="50" cy="700" r="12" fill="#4CAF50"/>
  <circle cx="50" cy="700" r="20" fill="rgba(76,175,80,0.3)"/>
  
  <!-- Stop Markers -->
  <circle cx="180" cy="450" r="10" fill="#FF9800"/>
  <text x="180" y="455" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">1</text>
  
  <circle cx="300" cy="200" r="10" fill="#FF9800"/>
  <text x="300" y="205" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#fff">2</text>
  
  <!-- Destination -->
  <circle cx="300" cy="50" r="12" fill="#E91E63"/>
  <text x="300" y="55" text-anchor="middle" font-family="Arial" font-size="10" fill="#fff">📍</text>
  
  <!-- Status Bar Overlay -->
  <rect x="0" y="0" width="375" height="44" fill="rgba(0,0,0,0.5)"/>
  <text x="187" y="30" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">9:41</text>
  
  <!-- Top Controls -->
  <circle cx="35" cy="75" r="22" fill="rgba(0,0,0,0.6)"/>
  <text x="35" y="80" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">←</text>
  
  <circle cx="340" cy="75" r="22" fill="rgba(0,0,0,0.6)"/>
  <text x="340" y="80" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">📍</text>
  
  <!-- Navigation Card -->
  <rect x="20" y="600" width="335" height="100" rx="16" fill="rgba(0,0,0,0.85)"/>
  <text x="40" y="635" font-family="Arial" font-size="14" fill="#8A9A94">Next Stop in 45 min</text>
  <text x="40" y="662" font-family="Arial" font-size="20" font-weight="bold" fill="#fff">Anıtkabir</text>
  <text x="40" y="685" font-family="Arial" font-size="13" fill="#8A9A94">📍 120 km away • 🎫 Free entry</text>
  
  <rect x="290" y="625" width="50" height="50" rx="8" fill="#E91E63"/>
  <text x="315" y="656" text-anchor="middle" font-family="Arial" font-size="18" fill="#fff">→</text>
  
  <!-- Bottom Info Bar -->
  <rect x="0" y="720" width="375" height="92" fill="rgba(0,0,0,0.9)"/>
  <text x="70" y="755" text-anchor="middle" font-family="Arial" font-size="11" fill="#8A9A94">ETA</text>
  <text x="70" y="775" text-anchor="middle" font-family="Arial" font-size="14" font-weight="600" fill="#fff">3:45 PM</text>
  
  <text x="187" y="755" text-anchor="middle" font-family="Arial" font-size="11" fill="#8A9A94">Distance</text>
  <text x="187" y="775" text-anchor="middle" font-family="Arial" font-size="14" font-weight="600" fill="#fff">520 km</text>
  
  <text x="305" y="755" text-anchor="middle" font-family="Arial" font-size="11" fill="#8A9A94">Stops Left</text>
  <text x="305" y="775" text-anchor="middle" font-family="Arial" font-size="14" font-weight="600" fill="#fff">2 / 3</text>
  
  <!-- Screen Label -->
  <rect x="10" y="775" width="355" height="25" fill="rgba(255,255,255,0.1)" rx="4"/>
  <text x="187" y="793" text-anchor="middle" font-family="Arial" font-size="11" fill="#999">Screen 14: Map / Navigation [CURRENT]</text>
</svg>
