<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <!-- Phone Frame with Background -->
  <rect x="0" y="0" width="375" height="812" fill="#1a2a3a"/>
  <rect x="0" y="0" width="375" height="812" fill="rgba(0,0,0,0.4)"/>
  
  <!-- Status Bar -->
  <text x="187" y="30" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">9:41</text>
  
  <!-- Profile Button (top right) -->
  <circle cx="340" cy="70" r="20" fill="rgba(255,255,255,0.2)"/>
  <text x="340" y="76" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">👤</text>
  
  <!-- Welcome Section -->
  <text x="187" y="200" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold" fill="#fff">Where to?</text>
  <text x="187" y="235" text-anchor="middle" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.8)">Start your next adventure</text>
  
  <!-- Destination Input -->
  <text x="30" y="310" font-family="Arial" font-size="14" font-weight="600" fill="#fff">Destination</text>
  
  <rect x="30" y="325" width="315" height="55" rx="15" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="55" y="358" font-family="Arial" font-size="16" fill="#E91E63">📍</text>
  <text x="80" y="358" font-family="Arial" font-size="15" fill="rgba(255,255,255,0.6)">Enter city or place...</text>
  
  <!-- Suggestions Box (shown when typing) -->
  <rect x="30" y="390" width="315" height="120" rx="12" fill="rgba(255,255,255,0.95)"/>
  <rect x="40" y="405" width="295" height="50" rx="4" fill="#f8f8f8"/>
  <text x="55" y="432" font-family="Arial" font-size="13" fill="#E91E63">📍</text>
  <text x="75" y="425" font-family="Arial" font-size="14" font-weight="600" fill="#333">İstanbul</text>
  <text x="75" y="445" font-family="Arial" font-size="11" fill="#666">İstanbul, Turkey</text>
  
  <rect x="40" y="460" width="295" height="40" rx="4" fill="transparent"/>
  <text x="55" y="485" font-family="Arial" font-size="13" fill="#E91E63">📍</text>
  <text x="75" y="480" font-family="Arial" font-size="14" font-weight="600" fill="#333">İzmir</text>
  <text x="75" y="495" font-family="Arial" font-size="11" fill="#666">İzmir, Turkey</text>
  
  <!-- Continue Button -->
  <rect x="30" y="550" width="315" height="55" rx="15" fill="#E91E63"/>
  <text x="160" y="583" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">Continue</text>
  <text x="280" y="583" font-family="Arial" font-size="16" fill="#fff">→</text>
  
  <!-- ========== 3-TAB BOTTOM NAVIGATION ========== -->
  <!-- Floating pill container -->
  <rect x="30" y="720" width="315" height="70" rx="35" fill="rgba(30,30,30,0.95)"/>
  
  <!-- My Profile Tab (inactive) -->
  <g>
    <circle cx="90" cy="745" r="18" fill="transparent"/>
    <text x="90" y="742" text-anchor="middle" font-family="Arial" font-size="18" fill="#8A9A94">👤</text>
    <text x="90" y="770" text-anchor="middle" font-family="Arial" font-size="9" fill="#8A9A94">My Profile</text>
  </g>
  
  <!-- Search Tab (ACTIVE - blue pill) -->
  <g>
    <rect x="145" y="725" width="85" height="40" rx="20" fill="#007AFF"/>
    <text x="187" y="742" text-anchor="middle" font-family="Arial" font-size="18" fill="#fff">🔍</text>
    <text x="187" y="770" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#007AFF">Search</text>
  </g>
  
  <!-- New Route Tab (inactive) -->
  <g>
    <circle cx="285" cy="745" r="18" fill="transparent"/>
    <text x="285" y="742" text-anchor="middle" font-family="Arial" font-size="18" fill="#8A9A94">🗺️</text>
    <text x="285" y="770" text-anchor="middle" font-family="Arial" font-size="9" fill="#8A9A94">New Route</text>
  </g>
  
  <!-- Screen Label -->
  <rect x="10" y="795" width="355" height="15" fill="transparent"/>
  <text x="187" y="806" text-anchor="middle" font-family="Arial" font-size="9" fill="#666">Screen 9: Home / Dashboard [CURRENT]</text>
</svg>
