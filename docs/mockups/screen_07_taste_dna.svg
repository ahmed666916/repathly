<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <!-- Phone Frame -->
  <rect x="0" y="0" width="375" height="812" fill="#ffffff"/>
  
  <!-- Status Bar -->
  <rect x="0" y="0" width="375" height="44" fill="#f5f5f5"/>
  <text x="187" y="30" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">9:41</text>
  
  <!-- Title Section -->
  <text x="24" y="85" font-family="Arial" font-size="24" font-weight="bold" fill="#333">Your Travel DNA</text>
  <text x="24" y="110" font-family="Arial" font-size="13" fill="#666">Set your preferences for personalized routes</text>
  
  <!-- Travel Style Section -->
  <text x="24" y="155" font-family="Arial" font-size="14" font-weight="bold" fill="#333">✈️  Travel Style</text>
  <rect x="24" y="165" width="327" height="40" rx="4" fill="#f8f8f8"/>
  <rect x="30" y="172" width="70" height="26" rx="13" fill="#f2f2f7" stroke="#e5e5ea"/>
  <text x="65" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Fast</text>
  <rect x="107" y="172" width="90" height="26" rx="13" fill="#E91E63"/>
  <text x="152" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Balanced</text>
  <rect x="204" y="172" width="100" height="26" rx="13" fill="#f2f2f7" stroke="#e5e5ea"/>
  <text x="254" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Experience</text>
  
  <!-- Detour Tolerance Section -->
  <text x="24" y="235" font-family="Arial" font-size="14" font-weight="bold" fill="#333">🛤️  Route Flexibility</text>
  <rect x="24" y="245" width="327" height="40" rx="4" fill="#f8f8f8"/>
  <rect x="30" y="252" width="60" height="26" rx="13" fill="#f2f2f7" stroke="#e5e5ea"/>
  <text x="60" y="270" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Low</text>
  <rect x="97" y="252" width="80" height="26" rx="13" fill="#E91E63"/>
  <text x="137" y="270" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Medium</text>
  <rect x="184" y="252" width="60" height="26" rx="13" fill="#f2f2f7" stroke="#e5e5ea"/>
  <text x="214" y="270" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">High</text>
  
  <!-- Budget Section -->
  <text x="24" y="315" font-family="Arial" font-size="14" font-weight="bold" fill="#333">💰  Budget Preference</text>
  <rect x="24" y="325" width="327" height="40" rx="4" fill="#f8f8f8"/>
  <rect x="30" y="332" width="70" height="26" rx="13" fill="#f2f2f7" stroke="#e5e5ea"/>
  <text x="65" y="350" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Budget</text>
  <rect x="107" y="332" width="85" height="26" rx="13" fill="#E91E63"/>
  <text x="150" y="350" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Moderate</text>
  <rect x="199" y="332" width="80" height="26" rx="13" fill="#f2f2f7" stroke="#e5e5ea"/>
  <text x="239" y="350" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Premium</text>
  
  <!-- Group Type Section -->
  <text x="24" y="395" font-family="Arial" font-size="14" font-weight="bold" fill="#333">👥  Travel Group</text>
  <rect x="24" y="405" width="327" height="40" rx="4" fill="#f8f8f8"/>
  <rect x="30" y="412" width="55" height="26" rx="13" fill="#E91E63"/>
  <text x="57" y="430" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Solo</text>
  <rect x="92" y="412" width="65" height="26" rx="13" fill="#f2f2f7" stroke="#e5e5ea"/>
  <text x="124" y="430" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Couple</text>
  <rect x="164" y="412" width="65" height="26" rx="13" fill="#f2f2f7" stroke="#e5e5ea"/>
  <text x="197" y="430" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Friends</text>
  <rect x="236" y="412" width="60" height="26" rx="13" fill="#f2f2f7" stroke="#e5e5ea"/>
  <text x="266" y="430" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Family</text>
  
  <!-- Stop Intensity Section -->
  <text x="24" y="475" font-family="Arial" font-size="14" font-weight="bold" fill="#333">☕  Stop Frequency</text>
  <rect x="24" y="485" width="327" height="40" rx="4" fill="#f8f8f8"/>
  <rect x="30" y="492" width="70" height="26" rx="13" fill="#f2f2f7" stroke="#e5e5ea"/>
  <text x="65" y="510" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Minimal</text>
  <rect x="107" y="492" width="85" height="26" rx="13" fill="#E91E63"/>
  <text x="150" y="510" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">Moderate</text>
  <rect x="199" y="492" width="80" height="26" rx="13" fill="#f2f2f7" stroke="#e5e5ea"/>
  <text x="239" y="510" text-anchor="middle" font-family="Arial" font-size="11" fill="#333">Maximum</text>
  
  <!-- Continue Button -->
  <rect x="24" y="720" width="327" height="52" rx="16" fill="#007AFF"/>
  <text x="187" y="753" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">Continue</text>
  
  <!-- Screen Label -->
  <rect x="10" y="770" width="355" height="30" fill="#f0f0f0" rx="4"/>
  <text x="187" y="790" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Screen 7: Taste DNA [CURRENT]</text>
</svg>
