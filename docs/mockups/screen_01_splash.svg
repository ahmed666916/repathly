<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <!-- Phone Frame -->
  <rect x="0" y="0" width="375" height="812" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
  
  <!-- Status Bar -->
  <rect x="0" y="0" width="375" height="44" fill="#f5f5f5"/>
  <text x="187" y="30" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">9:41</text>
  
  <!-- Content Area -->
  <rect x="20" y="300" width="335" height="212" fill="none"/>
  
  <!-- App Logo Circle -->
  <circle cx="187" cy="350" r="60" fill="none" stroke="#333" stroke-width="2"/>
  <text x="187" y="365" text-anchor="middle" font-family="Arial" font-size="48" font-weight="bold" fill="#E91E63">R</text>
  
  <!-- App Name -->
  <text x="187" y="450" text-anchor="middle" font-family="Arial" font-size="32" font-weight="bold" fill="#333">Repathly</text>
  
  <!-- Tagline -->
  <text x="187" y="485" text-anchor="middle" font-family="Arial" font-size="14" fill="#666">Experience-driven travel</text>
  
  <!-- Loading Indicator -->
  <circle cx="187" cy="700" r="15" fill="none" stroke="#E91E63" stroke-width="3" stroke-dasharray="30 60"/>
  
  <!-- Screen Label -->
  <rect x="10" y="770" width="355" height="30" fill="#f0f0f0" rx="4"/>
  <text x="187" y="790" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Screen 1: Splash Screen [CURRENT]</text>
</svg>
