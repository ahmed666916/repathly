<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <!-- Phone Frame -->
  <rect x="0" y="0" width="375" height="812" fill="#ffffff"/>
  
  <!-- Status Bar -->
  <rect x="0" y="0" width="375" height="44" fill="#f5f5f5"/>
  <text x="187" y="30" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">9:41</text>
  
  <!-- Header -->
  <circle cx="35" cy="70" r="18" fill="#f2f2f7"/>
  <text x="35" y="75" text-anchor="middle" font-family="Arial" font-size="14" fill="#333">←</text>
  <text x="187" y="75" text-anchor="middle" font-family="Arial" font-size="18" font-weight="600" fill="#333">Edit Profile</text>
  <text x="340" y="75" font-family="Arial" font-size="16" font-weight="600" fill="#007AFF">Save</text>
  
  <!-- Profile Photo -->
  <circle cx="187" cy="170" r="55" fill="#f2f2f7"/>
  <text x="187" y="180" text-anchor="middle" font-family="Arial" font-size="32" fill="#999">👤</text>
  <circle cx="225" cy="210" r="16" fill="#007AFF"/>
  <text x="225" y="215" text-anchor="middle" font-family="Arial" font-size="12" fill="#fff">📷</text>
  
  <!-- Form Fields -->
  <text x="30" y="260" font-family="Arial" font-size="13" font-weight="600" fill="#666">NAME</text>
  <rect x="20" y="270" width="335" height="50" rx="10" fill="#f8f8f8"/>
  <text x="40" y="302" font-family="Arial" font-size="15" fill="#333">John Doe</text>
  
  <text x="30" y="345" font-family="Arial" font-size="13" font-weight="600" fill="#666">USERNAME</text>
  <rect x="20" y="355" width="335" height="50" rx="10" fill="#f8f8f8"/>
  <text x="40" y="387" font-family="Arial" font-size="15" fill="#333">@johndoe</text>
  
  <text x="30" y="430" font-family="Arial" font-size="13" font-weight="600" fill="#666">BIO</text>
  <rect x="20" y="440" width="335" height="100" rx="10" fill="#f8f8f8"/>
  <text x="40" y="475" font-family="Arial" font-size="15" fill="#333">Coffee lover | Road trip</text>
  <text x="40" y="495" font-family="Arial" font-size="15" fill="#333">enthusiast 🚗</text>
  <text x="315" y="525" font-family="Arial" font-size="11" fill="#999">45/150</text>
  
  <text x="30" y="570" font-family="Arial" font-size="13" font-weight="600" fill="#666">EMAIL</text>
  <rect x="20" y="580" width="335" height="50" rx="10" fill="#f8f8f8"/>
  <text x="40" y="612" font-family="Arial" font-size="15" fill="#333">john@example.com</text>
  <text x="320" y="612" font-family="Arial" font-size="12" fill="#4CAF50">✓</text>
  
  <!-- Danger Zone -->
  <text x="30" y="670" font-family="Arial" font-size="13" font-weight="600" fill="#FF3B30">DANGER ZONE</text>
  
  <rect x="20" y="685" width="335" height="50" rx="10" fill="rgba(255,59,48,0.1)"/>
  <text x="40" y="717" font-family="Arial" font-size="15" fill="#FF3B30">Delete Account</text>
  <text x="325" y="717" font-family="Arial" font-size="14" fill="#FF3B30">›</text>
  
  <!-- FUTURE Badge -->
  <rect x="285" y="10" width="80" height="24" rx="4" fill="#FF9800"/>
  <text x="325" y="27" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#fff">FUTURE</text>
  
  <!-- Screen Label -->
  <rect x="10" y="770" width="355" height="30" fill="#f0f0f0" rx="4"/>
  <text x="187" y="790" text-anchor="middle" font-family="Arial" font-size="12" fill="#666">Screen 20: Edit Profile [FUTURE]</text>
</svg>
