<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 812" width="375" height="812">
  <!-- Phone Frame with Background -->
  <rect x="0" y="0" width="375" height="812" fill="#1a1a1a"/>
  <rect x="0" y="0" width="375" height="812" fill="rgba(0,0,0,0.5)"/>
  
  <!-- Status Bar -->
  <text x="187" y="30" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">9:41</text>
  
  <!-- Back Button -->
  <circle cx="40" cy="80" r="20" fill="rgba(255,255,255,0.15)"/>
  <text x="40" y="85" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">←</text>
  
  <!-- Title -->
  <text x="24" y="150" font-family="Arial" font-size="28" font-weight="bold" fill="#fff">Register</text>
  <text x="24" y="180" font-family="Arial" font-size="14" fill="#8A9A94">Create your account to start exploring</text>
  
  <!-- Name Input -->
  <rect x="24" y="220" width="327" height="52" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="50" y="252" font-family="Arial" font-size="14" fill="#8A9A94">👤</text>
  <text x="75" y="252" font-family="Arial" font-size="14" fill="#8A9A94">Full Name</text>
  
  <!-- Email Input -->
  <rect x="24" y="285" width="327" height="52" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="50" y="317" font-family="Arial" font-size="14" fill="#8A9A94">✉</text>
  <text x="75" y="317" font-family="Arial" font-size="14" fill="#8A9A94">Email address</text>
  
  <!-- Password Input -->
  <rect x="24" y="350" width="327" height="52" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="50" y="382" font-family="Arial" font-size="14" fill="#8A9A94">🔒</text>
  <text x="75" y="382" font-family="Arial" font-size="14" fill="#8A9A94">Password</text>
  
  <!-- Confirm Password Input -->
  <rect x="24" y="415" width="327" height="52" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="50" y="447" font-family="Arial" font-size="14" fill="#8A9A94">🔒</text>
  <text x="75" y="447" font-family="Arial" font-size="14" fill="#8A9A94">Confirm Password</text>
  
  <!-- Register Button -->
  <rect x="24" y="490" width="327" height="52" rx="12" fill="#E91E63"/>
  <text x="187" y="523" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#fff">Register</text>
  
  <!-- Divider -->
  <line x1="24" y1="570" x2="160" y2="570" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <text x="187" y="575" text-anchor="middle" font-family="Arial" font-size="14" fill="#8A9A94">or</text>
  <line x1="215" y1="570" x2="351" y2="570" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  
  <!-- Social Buttons -->
  <rect x="24" y="600" width="155" height="44" rx="22" fill="rgba(255,255,255,0.1)"/>
  <text x="101" y="628" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">G  Google</text>
  
  <rect x="196" y="600" width="155" height="44" rx="22" fill="rgba(255,255,255,0.1)"/>
  <text x="273" y="628" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">  Apple</text>
  
  <!-- Login Link -->
  <text x="115" y="700" font-family="Arial" font-size="14" fill="#8A9A94">Already have an account?</text>
  <text x="300" y="700" font-family="Arial" font-size="14" font-weight="600" fill="#E91E63">Login</text>
  
  <!-- Screen Label -->
  <rect x="10" y="770" width="355" height="30" fill="rgba(255,255,255,0.1)" rx="4"/>
  <text x="187" y="790" text-anchor="middle" font-family="Arial" font-size="12" fill="#999">Screen 4: Register [CURRENT]</text>
</svg>
